services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: heretix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heretix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/heretix
      PORT: "5000"
      API_KEY: ${API_KEY}
      NVD_API_KEY: ${NVD_API_KEY:-}
      CISCO_CLIENT_ID: ${CISCO_CLIENT_ID:-}
      CISCO_CLIENT_SECRET: ${CISCO_CLIENT_SECRET:-}
    ports:
      - "${PORT:-5000}:5000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  db_data:
